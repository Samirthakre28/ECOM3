<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Thrift Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      margin: 80px auto;
    }
    .contact-info {
      background-color: var(--pastel-sage);
      padding: 40px;
      border-radius: 20px;
      background-color: #f5f5f5;
    }
    .contact-info h2 {
      margin-bottom: 20px;
      font-size: 2rem;
    }
    .contact-info p {
      margin-bottom: 30px;
      color: var(--text-light);
    }
    .info-item {
      margin-bottom: 20px;
    }
    .info-item strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text-main);
    }
    
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-group input, .form-group textarea {
      padding: 15px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--text-main);
    }
    
    @media (max-width: 768px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header></header>

  <main class="container">
    <div class="contact-container animate-fade-in">
      
      <div class="contact-info">
        <h2>Get in Touch</h2>
        <p>Have a question about an item, your order, or just want to say hi? We'd love to hear from you.</p>
        
        <div class="info-item">
          <strong>Email</strong>
          <a href="mailto:hello@thriftstore.com">hello@thriftstore.com</a>
        </div>
        
        <div class="info-item">
          <strong>Customer Support Hours</strong>
          <span>Monday - Friday: 9am - 5pm EST</span>
        </div>
        
        <div class="info-item">
          <strong>HQ Location</strong>
          <span>Brooklyn, NY 11211 (Online only)</span>
        </div>
      </div>

      <div>
        <h2 style="margin-bottom: 25px; font-size: 2rem;">Send a Message</h2>
        <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.'); this.reset();">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required placeholder="Your name">
          </div>
          
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="your@email.com">
          </div>
          
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" required placeholder="How can we help?">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" required placeholder="Write your message here..."></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Send Message</button>
        </form>
      </div>

    </div>
  </main>

  <footer></footer>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
