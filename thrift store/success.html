<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Thrift Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px 20px;
    }

    .success-icon {
      width: 120px;
      height: 120px;
      background-color: var(--accent-sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      color: white;
      font-size: 60px;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .success-title {
      font-size: 2.5rem;
      margin-bottom: 15px;
      color: var(--text-main);
    }

    .success-text {
      font-size: 1.1rem;
      color: var(--text-light);
      margin-bottom: 40px;
      max-width: 500px;
      line-height: 1.6;
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <header></header>

  <main class="container">
    <div class="success-container animate-fade-in">
      <div class="success-icon">✓</div>
      <h1 class="success-title">Order Confirmed!</h1>
      <p class="success-text">
        Thank you for choosing sustainable fashion. We've received your order and are preparing your aesthetic finds for
        shipping!
      </p>
      <a href="index.html" class="btn btn-primary" style="padding: 15px 40px;">Return Home</a>
    </div>
  </main>

  <footer></footer>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>

</html>
